<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
    <!-- Traditional Hakka Red Floral Pattern (客家花布) -->
    <!-- Red Background -->
    <rect width="60" height="60" fill="#dc2626"/>
    <!-- Peony Flower Petals -->
    <circle cx="30" cy="20" r="11" fill="#fda4af" opacity="0.95"/>
    <circle cx="20" cy="30" r="11" fill="#fda4af" opacity="0.95"/>
    <circle cx="40" cy="30" r="11" fill="#fda4af" opacity="0.95"/>
    <circle cx="30" cy="40" r="11" fill="#fda4af" opacity="0.95"/>
    
    <circle cx="24" cy="24" r="10" fill="#f43f5e" opacity="0.9"/>
    <circle cx="36" cy="24" r="10" fill="#f43f5e" opacity="0.9"/>
    <circle cx="24" cy="36" r="10" fill="#f43f5e" opacity="0.9"/>
    <circle cx="36" cy="36" r="10" fill="#f43f5e" opacity="0.9"/>
    
    <!-- Flower Center -->
    <circle cx="30" cy="30" r="8" fill="#facc15"/>
    <circle cx="30" cy="30" r="4" fill="#ffffff"/>
    
    <!-- Small Accent Flowers in Corners -->
    <circle cx="0" cy="0" r="6" fill="#facc15"/>
    <circle cx="60" cy="0" r="6" fill="#facc15"/>
    <circle cx="0" cy="60" r="6" fill="#facc15"/>
    <circle cx="60" cy="60" r="6" fill="#facc15"/>
    
    <!-- Green Leaves -->
    <path d="M 12 12 Q 18 6 15 20 Q 6 18 12 12 Z" fill="#22c55e"/>
    <path d="M 48 48 Q 42 54 45 40 Q 54 42 48 48 Z" fill="#22c55e"/>
    <path d="M 48 12 Q 42 6 45 20 Q 54 18 48 12 Z" fill="#16a34a"/>
    <path d="M 12 48 Q 18 54 15 40 Q 6 42 12 48 Z" fill="#16a34a"/>
</svg>
